<!DOCTYPE html>
<!-- Mein Training v3.2 -->
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#101418">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Mein Training</title>
<style>
  :root{
    --bg:#101418; --card:#1a2027; --card2:#222a33; --line:#2e3844;
    --text:#e8edf2; --muted:#8a97a5; --accent:#4dabf7; --green:#51cf66;
    --orange:#ffa94d; --red:#ff6b6b;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; background:var(--bg); color:var(--text);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; font-size:16px;}
  header{position:sticky; top:0; z-index:10; background:var(--bg);
    border-bottom:1px solid var(--line); padding:10px 12px 0;}
  h1{font-size:18px; margin:0 0 8px; display:flex; align-items:center; justify-content:space-between;}
  h1 .menu-btn{background:none; border:none; color:var(--muted); font-size:20px; padding:4px 8px;}
  /* Tabs */
  .tabs{display:flex; gap:6px; overflow-x:auto; padding-bottom:10px; scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{flex:0 0 auto; padding:8px 14px; border-radius:20px; background:var(--card);
    border:1px solid var(--line); color:var(--muted); font-size:14px; white-space:nowrap;}
  .tab.active{background:var(--accent); border-color:var(--accent); color:#fff; font-weight:600;}
  .tab.add{color:var(--accent); border-style:dashed;}
  main{padding:12px; padding-bottom:132px; max-width:560px; margin:0 auto;}
  /* Exercise thumbnail */
  .thumb{width:44px; height:44px; border-radius:8px; object-fit:cover; background:var(--card2); flex:0 0 auto;}
  .thumb-sm{width:34px; height:34px; border-radius:7px; object-fit:cover; background:var(--card2); flex:0 0 auto;}
  /* Autocomplete */
  .sugg{max-height:260px; overflow-y:auto; margin-top:4px;}
  .sugg-item{display:flex; align-items:center; gap:10px; padding:7px 6px; border-radius:8px; font-size:14px;}
  .sugg-item:active{background:var(--card2);}
  .sugg-item img{width:40px; height:40px; border-radius:6px; object-fit:cover; background:var(--card2);}
  .sugg-item .s-mus{margin-left:auto; font-size:11px; color:var(--muted);}
  /* Notes */
  textarea.note{width:100%; background:var(--card2); border:1px solid var(--line); color:var(--text);
    border-radius:8px; padding:8px; font-size:14px; margin-top:8px; min-height:52px; resize:vertical;}
  .c-note{font-size:12px; color:var(--orange); margin-top:6px;}
  /* Chart */
  canvas.chart{width:100%; height:140px; background:var(--card2); border-radius:10px; margin-bottom:8px;}
  .chart-legend{font-size:11px; color:var(--muted); margin-bottom:8px; display:flex; gap:12px;}
  .chart-legend .lg-kg{color:var(--accent);}
  .chart-legend .lg-reps{color:var(--orange);}
  /* Rest timer bar */
  .restbar{position:fixed; bottom:46px; left:0; right:0; background:var(--card);
    border-top:1px solid var(--line); padding:7px 12px; display:flex; gap:8px;
    align-items:center; justify-content:center; z-index:9;}
  .restbar .r-label{font-size:13px; color:var(--muted);}
  .restbar button{background:var(--card2); border:1px solid var(--line); color:var(--text);
    border-radius:8px; padding:8px 14px; font-size:14px; font-weight:600;}
  .restbar.running{background:#1d2b1f;}
  .restbar .r-count{font-size:20px; font-weight:700; color:var(--green); min-width:64px; text-align:center;}
  .restbar .r-stop{color:var(--red);}
  .restbar.flash{background:var(--green);}
  .restbar.flash .r-count{color:#0c130d;}
  /* Calendar overlay */
  .overlay{position:fixed; inset:0; background:var(--bg); z-index:20; display:none;
    padding:16px; overflow-y:auto;}
  .overlay.open{display:block;}
  .ov-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
  .ov-head h2{font-size:18px; margin:0;}
  .ov-close{background:var(--card); border:1px solid var(--line); color:var(--text);
    border-radius:10px; padding:8px 14px; font-size:15px;}
  .cal-nav{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
  .cal-nav button{background:var(--card); border:1px solid var(--line); color:var(--text);
    border-radius:10px; padding:8px 16px; font-size:16px;}
  .cal-nav .cal-month{font-size:16px; font-weight:600;}
  .cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:4px; max-width:420px; margin:0 auto;}
  .cal-grid .dow{text-align:center; font-size:11px; color:var(--muted); padding:4px 0;}
  .cal-day{aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    border-radius:9px; background:var(--card); font-size:13px; color:var(--muted); position:relative;}
  .cal-day.other{opacity:.25;}
  .cal-day.today{border:1px solid var(--accent); color:var(--text);}
  .cal-day.trained{background:#173c22; color:var(--green); font-weight:600;}
  .cal-day.trained::after{content:''; width:5px; height:5px; border-radius:50%; background:var(--green); margin-top:2px;}
  .cal-stats{display:flex; gap:10px; margin-top:16px; max-width:420px; margin-left:auto; margin-right:auto;}
  .stat{flex:1; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px; text-align:center;}
  .stat .v{font-size:22px; font-weight:700; color:var(--green);}
  .stat .l{font-size:11px; color:var(--muted); margin-top:2px;}
  .empty{color:var(--muted); text-align:center; margin-top:48px; line-height:1.6;}
  /* Mode toggle + rounds */
  .mode-row{display:flex; gap:8px; margin-bottom:12px; align-items:center;}
  .seg{display:flex; background:var(--card); border:1px solid var(--line); border-radius:10px; overflow:hidden; flex:1;}
  .seg button{flex:1; border:none; background:none; color:var(--muted); padding:9px 6px; font-size:13px; font-weight:600;}
  .seg button.on{background:var(--accent); color:#fff;}
  .rounds{display:flex; gap:8px; margin-bottom:12px;}
  .round-btn{flex:1; border:1px solid var(--line); background:var(--card); color:var(--muted);
    border-radius:10px; padding:10px 6px; font-size:14px; font-weight:600;}
  .round-btn.on{background:var(--orange); border-color:var(--orange); color:#1d1206;}
  .round-total{text-align:center; font-size:13px; color:var(--muted); margin-bottom:10px;}
  .round-total b{color:var(--text);}
  /* Circuit compact card */
  .ccard{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:10px 12px; margin-bottom:10px;}
  .ccard .c-name{font-weight:600; font-size:15px; margin-bottom:2px; overflow-wrap:anywhere; line-height:1.25;}
  .ccard .c-last{font-size:12px; color:var(--muted); margin-bottom:8px; overflow-wrap:anywhere;}
  .c-row{display:flex; gap:6px; align-items:center;}
  .c-row input.num{flex:1;}
  .circuit-actions{display:flex; gap:8px; margin-top:4px; margin-bottom:14px;}
  /* Exercise card */
  .card{background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:12px; margin-bottom:14px;}
  .card-head{display:flex; align-items:center; gap:8px; margin-bottom:10px;}
  .head-mid{flex:1; min-width:0; display:flex; flex-direction:column; gap:2px;}
  .card-head .name{font-weight:600; font-size:16px; line-height:1.25; overflow-wrap:anywhere;}
  .icon-btn{background:var(--card2); border:1px solid var(--line); color:var(--muted);
    border-radius:8px; padding:6px 9px; font-size:14px; flex:0 0 auto;}
  .total{font-size:12px; color:var(--muted); white-space:nowrap;}
  .total b{color:var(--text);}
  /* Set grid */
  table.sets{width:100%; border-collapse:collapse;}
  table.sets th{font-size:11px; color:var(--muted); font-weight:500; text-transform:uppercase;
    letter-spacing:.5px; padding:2px 4px; text-align:center;}
  table.sets td{padding:3px 3px;}
  .set-label{font-size:13px; color:var(--muted); text-align:center; width:34px;}
  input.num{width:100%; background:var(--card2); border:1px solid var(--line); color:var(--text);
    border-radius:8px; padding:9px 6px; font-size:16px; text-align:center;}
  input.num:focus{outline:none; border-color:var(--accent);}
  .time-cell{display:flex; gap:4px; align-items:center;}
  input.time{width:64px; background:var(--card2); border:1px solid var(--line); color:var(--text);
    border-radius:8px; padding:9px 4px; font-size:15px; text-align:center;}
  input.time.running{border-color:var(--green); color:var(--green);}
  .timer-btn{border:none; border-radius:8px; padding:9px 10px; font-size:14px;
    background:var(--card2); color:var(--green); border:1px solid var(--line);}
  .timer-btn.running{background:var(--green); color:#0c130d;}
  /* Action row */
  .actions{display:flex; gap:8px; margin-top:10px;}
  .btn{flex:1; border:none; border-radius:10px; padding:11px 8px; font-size:14px; font-weight:600;}
  .btn.copy{background:var(--card2); color:var(--accent); border:1px solid var(--line);}
  .btn.save{background:var(--green); color:#0c130d;}
  .btn.hist{background:var(--card2); color:var(--muted); border:1px solid var(--line); flex:0 0 auto; padding:11px 14px;}
  .btn:disabled{opacity:.4;}
  /* History */
  .history{margin-top:10px; border-top:1px solid var(--line); padding-top:8px;}
  .h-entry{background:var(--card2); border-radius:10px; padding:8px 10px; margin-bottom:8px; font-size:13px;}
  .h-date{color:var(--accent); font-weight:600; margin-bottom:4px; display:flex; justify-content:space-between;}
  .h-date .h-total{color:var(--muted); font-weight:400;}
  .h-sets{display:flex; gap:6px; flex-wrap:wrap;}
  .h-set{background:var(--card); border:1px solid var(--line); border-radius:7px; padding:4px 8px; color:var(--text);}
  .h-set small{color:var(--muted);}
  .h-del{background:none; border:none; color:var(--red); font-size:12px; padding:2px 4px; float:right;}
  /* Add buttons */
  .add-ex{width:100%; padding:14px; border-radius:14px; border:1px dashed var(--line);
    background:none; color:var(--accent); font-size:15px; font-weight:600;}
  /* Footer */
  footer{position:fixed; bottom:0; left:0; right:0; background:var(--bg);
    border-top:1px solid var(--line); padding:8px 12px; display:flex; gap:8px;
    justify-content:center; font-size:13px;}
  footer button{background:none; border:none; color:var(--muted); font-size:13px; padding:6px 10px;}
  dialog{background:var(--card); color:var(--text); border:1px solid var(--line);
    border-radius:14px; padding:16px; width:min(90vw,340px);}
  dialog::backdrop{background:rgba(0,0,0,.6);}
  dialog input[type=text]{width:100%; background:var(--card2); border:1px solid var(--line);
    color:var(--text); border-radius:8px; padding:10px; font-size:16px; margin:10px 0;}
  dialog .d-actions{display:flex; gap:8px; justify-content:flex-end;}
  dialog button{border:none; border-radius:8px; padding:9px 16px; font-size:14px; font-weight:600;}
  dialog .ok{background:var(--accent); color:#fff;}
  dialog .cancel{background:var(--card2); color:var(--muted);}
  dialog .danger{background:var(--red); color:#fff;}
</style>
</head>
<body>
<header>
  <h1><span>🏋️ Mein Training</span></h1>
  <div class="tabs" id="tabs"></div>
</header>
<main id="main"></main>

<div class="restbar" id="restbar">
  <span class="r-label">⏱ Pause:</span>
  <button onclick="startRest(60)">1:00</button>
  <button onclick="startRest(90)">1:30</button>
  <button onclick="startRest(120)">2:00</button>
</div>

<footer>
  <button onclick="openCalendar()">📅 Kalender</button>
  <button onclick="renamePage()">✎ Seite</button>
  <button onclick="deletePage()">🗑 Seite</button>
  <button onclick="openData()">💾 Daten</button>
</footer>

<div class="overlay" id="cal-overlay">
  <div class="ov-head">
    <h2>📅 Trainingskalender</h2>
    <button class="ov-close" onclick="closeCalendar()">✕ Schließen</button>
  </div>
  <div class="cal-nav">
    <button onclick="calShift(-1)">‹</button>
    <span class="cal-month" id="cal-month"></span>
    <button onclick="calShift(1)">›</button>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
  <div class="cal-stats" id="cal-stats"></div>
</div>

<dialog id="data-dlg">
  <div style="font-weight:600; margin-bottom:12px">💾 Daten sichern &amp; übertragen</div>
  <div style="display:flex; flex-direction:column; gap:8px">
    <button class="ok" onclick="exportData()">⬇ Backup (JSON, komplett)</button>
    <button class="ok" onclick="importData()">⬆ Import (JSON)</button>
    <button class="ok" style="background:var(--green);color:#0c130d" onclick="exportCSV()">⬇ Export als CSV (Excel)</button>
    <button class="ok" style="background:var(--green);color:#0c130d" onclick="importCSV()">⬆ Import aus CSV</button>
    <button class="cancel" onclick="closeData()">Schließen</button>
  </div>
</dialog>

<dialog id="dlg">
  <div id="dlg-title" style="font-weight:600"></div>
  <input type="text" id="dlg-input" placeholder="" autocomplete="off">
  <div class="sugg" id="dlg-sugg"></div>
  <div class="d-actions">
    <button class="cancel" onclick="dlgClose()">Abbrechen</button>
    <button class="ok" id="dlg-ok">OK</button>
  </div>
</dialog>
<input type="file" id="file-in" accept=".json" style="display:none">

<script>
'use strict';
const KEY = 'fitness-tracker-v1';

// ---------- State ----------
let state = load();
let activePage = state.pages.length ? state.pages[0].id : null;
let activeRound = 0;
const timers = {}; // "exId-setIdx" -> {startTs, interval}

function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return { pages: [] };
}
function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function page(){ return state.pages.find(p => p.id === activePage); }
function findEx(exId){
  for(const p of state.pages){
    const ex = p.exercises.find(e => e.id === exId);
    if(ex) return ex;
  }
  return null;
}

// New exercise: 3 sets, current entry + history
function newExercise(name, img){
  return { id: uid(), name, img: img || '', note: '', current: emptySets(), history: [] };
}

// ---------- Exercise catalog (free-exercise-db, public domain) ----------
const IMG_BASE = 'https://cdn.jsdelivr.net/gh/yuhonas/free-exercise-db@main/exercises/';
const CAT_URL  = 'https://cdn.jsdelivr.net/gh/yuhonas/free-exercise-db@main/dist/exercises.json';
let catalog = [];
function norm(s){ return (s||'').toLowerCase().replace(/[^a-z0-9äöüß]/g,''); }
function loadCatalog(){
  try{
    const c = localStorage.getItem('exdb-v1');
    if(c){ catalog = JSON.parse(c); return; }
  }catch(e){}
  fetch(CAT_URL).then(r => r.json()).then(list => {
    catalog = list.map(e => ({ n: e.name, i: (e.images && e.images[0]) || '', m: (e.primaryMuscles && e.primaryMuscles[0]) || '' }));
    try{ localStorage.setItem('exdb-v1', JSON.stringify(catalog)); }catch(e){}
  }).catch(()=>{});
}
// German name -> English catalog search term
const GER = [
  ['Liegestütze','Pushups'],['Klimmzüge','Pullups'],['Chin-Ups','Chin-Up'],
  ['Bankdrücken','Barbell Bench Press'],['Kurzhantel-Bankdrücken','Dumbbell Bench Press'],
  ['Schrägbankdrücken','Incline Dumbbell Press'],['Negativ-Bankdrücken','Decline Barbell Bench Press'],
  ['Enges Bankdrücken','Close-Grip Barbell Bench Press'],['Fliegende','Dumbbell Flyes'],
  ['Butterfly','Butterfly'],['Kabelzug-Crossover','Cable Crossover'],
  ['Dips','Dips - Chest Version'],['Trizeps-Dips','Dips - Triceps Version'],['Bench Dips','Bench Dips'],
  ['Kniebeugen','Barbell Squat'],['Frontkniebeugen','Front Barbell Squat'],['Goblet Squat','Goblet Squat'],
  ['Beinpresse','Leg Press'],['Ausfallschritte','Dumbbell Lunges'],['Ausfallschritte Langhantel','Barbell Lunge'],
  ['Beinstrecker','Leg Extensions'],['Beinbeuger','Lying Leg Curls'],
  ['Wadenheben stehend','Standing Calf Raises'],['Wadenheben sitzend','Seated Calf Raise'],
  ['Bulgarische Kniebeugen','One Leg Barbell Squat'],['Step-Ups','Dumbbell Step Ups'],
  ['Kreuzheben','Barbell Deadlift'],['Rumänisches Kreuzheben','Romanian Deadlift'],['Sumo-Kreuzheben','Sumo Deadlift'],
  ['Glute Bridge','Butt Lift'],['Hip Thrust','Barbell Hip Thrust'],
  ['Rudern Langhantel','Bent Over Barbell Row'],['Rudern Kurzhantel','One-Arm Dumbbell Row'],
  ['Rudern Kabelzug','Seated Cable Rows'],['T-Bar Rudern','T-Bar Row'],
  ['Latzug','Wide-Grip Lat Pulldown'],['Überzüge','Straight-Arm Dumbbell Pullover'],
  ['Hyperextensions','Hyperextensions'],['Good Mornings','Good Morning'],['Superman','Superman'],
  ['Face Pulls','Face Pull'],['Shrugs','Barbell Shrug'],['Aufrechtes Rudern','Upright Barbell Row'],
  ['Schulterdrücken Langhantel','Standing Military Press'],['Schulterdrücken Kurzhantel','Dumbbell Shoulder Press'],
  ['Arnold Press','Arnold Dumbbell Press'],['Seitheben','Side Lateral Raise'],
  ['Frontheben','Front Dumbbell Raise'],['Vorgebeugtes Seitheben','Reverse Flyes'],
  ['Bizeps-Curls','Barbell Curl'],['Kurzhantel-Curls','Dumbbell Bicep Curl'],['Hammer-Curls','Hammer Curls'],
  ['Konzentrations-Curls','Concentration Curls'],['SZ-Curls','EZ-Bar Curl'],['Preacher Curls','Preacher Curl'],
  ['Trizepsdrücken Kabel','Triceps Pushdown'],['French Press','Lying Triceps Press'],
  ['Kickbacks','Tricep Dumbbell Kickback'],['Überkopf-Trizepsdrücken','Standing Dumbbell Triceps Extension'],
  ['Unterarmstütz (Plank)','Plank'],['Seitstütz','Side Bridge'],['Crunches','Crunches'],['Sit-Ups','Sit-Up'],
  ['Beinheben hängend','Hanging Leg Raise'],['Beinheben liegend','Flat Bench Lying Leg Raise'],
  ['Russian Twist','Russian Twist'],['Mountain Climbers','Mountain Climbers'],
  ['Fahrrad-Crunches','Air Bike'],['Ab-Roller','Ab Roller'],['Dead Bug','Dead Bug'],
  ['Burpees','Burpee'],['Seilspringen','Rope Jumping'],['Kettlebell Swings','Kettlebell Swings'],
  ['Rudergerät','Rowing, Stationary'],['Laufband','Running, Treadmill'],['Ergometer','Bicycling'],
  ['Farmers Walk','Farmer\'s Walk'],['Box Jumps','Box Jump'],['Turkish Get-Up','Turkish Get-Up'],
  ['Wandsitzen','Wall Sit'],['Hampelmann (Jumping Jacks)','Jumping Jacks']
];
function findCat(term){
  const t = norm(term);
  if(!t) return null;
  return catalog.find(c => norm(c.n) === t) || catalog.find(c => norm(c.n).includes(t)) || null;
}
function suggest(q){
  q = q.trim(); if(q.length < 2) return [];
  const nq = norm(q), out = [], seen = new Set();
  GER.forEach(([de,en]) => {
    if(norm(de).includes(nq)){
      const c = findCat(en);
      out.push({ name: de, img: c ? c.i : '', mus: c ? c.m : '' });
      if(c) seen.add(c.n);
    }
  });
  catalog.forEach(c => {
    if(out.length < 12 && !seen.has(c.n) && norm(c.n).includes(nq))
      out.push({ name: c.n, img: c.i, mus: c.m });
  });
  return out.slice(0, 8);
}
function emptySets(){
  return [ {kg:'', reps:'', sec:0}, {kg:'', reps:'', sec:0}, {kg:'', reps:'', sec:0} ];
}

// ---------- Time helpers ----------
function fmt(sec){
  sec = Math.round(sec);
  const m = Math.floor(sec/60), s = sec % 60;
  return m + ':' + String(s).padStart(2,'0');
}
function parseTime(str){
  str = (str||'').trim();
  if(!str) return 0;
  if(str.includes(':')){
    const [m,s] = str.split(':');
    return (parseInt(m)||0)*60 + (parseInt(s)||0);
  }
  return parseInt(str)||0;
}

// ---------- Dialog helper ----------
const dlg = document.getElementById('dlg');
function ask(title, value, cb, placeholder){
  document.getElementById('dlg-title').textContent = title;
  const inp = document.getElementById('dlg-input');
  const sg = document.getElementById('dlg-sugg');
  sg.innerHTML = ''; inp.oninput = null;
  inp.value = value || ''; inp.placeholder = placeholder || '';
  document.getElementById('dlg-ok').onclick = () => {
    const v = inp.value.trim();
    dlg.close();
    if(v) cb(v);
  };
  dlg.showModal();
  setTimeout(()=>inp.focus(), 50);
}
// Ask with exercise autocomplete: cb(name, img)
function askExercise(title, cb){
  document.getElementById('dlg-title').textContent = title;
  const inp = document.getElementById('dlg-input');
  const sg = document.getElementById('dlg-sugg');
  inp.value = ''; inp.placeholder = 'z.B. Liegestütze'; sg.innerHTML = '';
  let picked = null;
  inp.oninput = () => {
    picked = null;
    const res = suggest(inp.value);
    sg.innerHTML = res.map((r,i) =>
      `<div class="sugg-item" data-i="${i}">
        ${r.img ? `<img src="${IMG_BASE}${esc(r.img)}" loading="lazy" onerror="this.style.display='none'">` : ''}
        <span>${esc(r.name)}</span>${r.mus ? `<span class="s-mus">${esc(r.mus)}</span>` : ''}
      </div>`).join('');
    sg.querySelectorAll('.sugg-item').forEach(el => {
      el.onclick = () => {
        picked = res[+el.dataset.i];
        dlg.close();
        cb(picked.name, picked.img);
      };
    });
  };
  document.getElementById('dlg-ok').onclick = () => {
    const v = inp.value.trim();
    dlg.close();
    if(!v) return;
    const res = suggest(v);
    const exact = res.find(r => norm(r.name) === norm(v));
    cb(v, exact ? exact.img : '');
  };
  dlg.showModal();

// ---------- Timer (per set) ----------
function toggleTimer(exId, idx){
  const key = `${exId}-${idx}`;
  const ex = findEx(exId); if(!ex) return;
  if(timers[key]){                    // stop
    ex.current[idx].sec = currentSec(ex, key, idx);
    clearInterval(timers[key].interval);
    delete timers[key];
    save();
  } else {                            // start
    timers[key] = { startTs: Date.now(), interval: setInterval(()=>tick(exId, idx), 1000) };
  }
  paintTimer(exId, idx);
  updateTotal(exId);
  updateRoundTotal();
}
function currentSec(ex, key, idx){
  const base = ex.current[idx].sec || 0;
  if(!timers[key]) return base;
  return base + (Date.now() - timers[key].startTs)/1000;
}
function tick(exId, idx){
  const ex = findEx(exId); if(!ex) return;
  const inp = document.getElementById(`time-${exId}-${idx}`);
  if(inp) inp.value = fmt(currentSec(ex, `${exId}-${idx}`, idx));
  updateTotal(exId);
  updateRoundTotal();
}
function updateRoundTotal(){
  const p = page(); if(!p || (p.mode||'ex') !== 'circuit') return;
  const el = document.getElementById('round-total');
  if(!el) return;
  const sum = p.exercises.reduce((a,ex)=> a + currentSec(ex, `${ex.id}-${activeRound}`, activeRound), 0);
  el.innerHTML = `Runde ${activeRound+1} gesamt: <b>${fmt(sum)}</b>`;
}
function paintTimer(exId, idx){
  const key = `${exId}-${idx}`;
  const btn = document.getElementById(`tbtn-${exId}-${idx}`);
  const inp = document.getElementById(`time-${exId}-${idx}`);
  const running = !!timers[key];
  if(btn){ btn.textContent = running ? '■' : '▶'; btn.classList.toggle('running', running); }
  if(inp){ inp.classList.toggle('running', running); inp.readOnly = running; }
}
function stopAllTimers(exId){
  const ex = findEx(exId);
  [0,1,2].forEach(idx => {
    const key = `${exId}-${idx}`;
    if(timers[key]){
      if(ex) ex.current[idx].sec = currentSec(ex, key, idx);
      clearInterval(timers[key].interval);
      delete timers[key];
    }
  });
  save();
}
function totalSec(ex){
  return [0,1,2].reduce((sum,idx)=> sum + currentSec(ex, `${ex.id}-${idx}`, idx), 0);
}
function updateTotal(exId){
  const ex = findEx(exId); if(!ex) return;
  const el = document.getElementById(`total-${exId}`);
  if(el) el.innerHTML = 'Gesamt: <b>' + fmt(totalSec(ex)) + '</b>';
}

// ---------- Save session to history ----------
function saveSession(exId){
  const ex = findEx(exId); if(!ex) return;
  stopAllTimers(exId);
  const hasData = ex.current.some(s => s.kg !== '' || s.reps !== '' || s.sec > 0);
  if(!hasData){ alert('Noch keine Werte eingetragen.'); return; }
  ex.history.unshift({
    date: new Date().toISOString(),
    sets: ex.current.map(s => ({ kg: s.kg, reps: s.reps, sec: Math.round(s.sec) }))
  });
  if(ex.history.length > 100) ex.history.length = 100;
  ex.current = emptySets();
  save(); render();
}
function saveAll(){
  const p = page(); if(!p) return;
  let n = 0;
  p.exercises.forEach(ex => {
    stopAllTimers(ex.id);
    if(ex.current.some(s => s.kg !== '' || s.reps !== '' || s.sec > 0)){
      ex.history.unshift({
        date: new Date().toISOString(),
        sets: ex.current.map(s => ({ kg: s.kg, reps: s.reps, sec: Math.round(s.sec) }))
      });
      if(ex.history.length > 100) ex.history.length = 100;
      ex.current = emptySets();
      n++;
    }
  });
  if(!n){ alert('Noch keine Werte eingetragen.'); return; }
  activeRound = 0;
  save(); render();
}

// ---------- Rest timer ----------
let restEnd = 0, restIv = null;
function startRest(sec){
  restEnd = Date.now() + sec*1000;
  clearInterval(restIv);
  restIv = setInterval(restTick, 250);
  restTick();
}
function stopRest(){
  clearInterval(restIv); restIv = null;
  const bar = document.getElementById('restbar');
  bar.classList.remove('running','flash');
  bar.innerHTML = `<span class="r-label">⏱ Pause:</span>
    <button onclick="startRest(60)">1:00</button>
    <button onclick="startRest(90)">1:30</button>
    <button onclick="startRest(120)">2:00</button>`;
}
function restTick(){
  const left = Math.ceil((restEnd - Date.now())/1000);
  const bar = document.getElementById('restbar');
  if(left <= 0){
    clearInterval(restIv); restIv = null;
    bar.classList.add('flash');
    bar.innerHTML = `<span class="r-count">Weiter geht's! 💪</span>
      <button class="r-stop" onclick="stopRest()">OK</button>`;
    if(navigator.vibrate) navigator.vibrate([300,120,300,120,500]);
    beep();
    setTimeout(stopRest, 6000);
    return;
  }
  bar.classList.add('running');
  bar.innerHTML = `<span class="r-label">Pause</span>
    <span class="r-count">${fmt(left)}</span>
    <button onclick="restEnd+=30000;restTick()">+30s</button>
    <button class="r-stop" onclick="stopRest()">✕</button>`;
}
function beep(){
  try{
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    [0, .25, .5].forEach(t => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.frequency.value = 880; g.gain.value = .25;
      o.start(ac.currentTime + t); o.stop(ac.currentTime + t + .15);
    });
  }catch(e){}
}

let calYM = null;
function trainedDays(){
  const days = {};
  state.pages.forEach(p => p.exercises.forEach(ex => ex.history.forEach(h => {
    days[h.date.slice(0,10)] = (days[h.date.slice(0,10)]||0) + 1;
  })));
  return days;
}
function openCalendar(){
  const now = new Date();
  calYM = [now.getFullYear(), now.getMonth()];
  renderCalendar();
  document.getElementById('cal-overlay').classList.add('open');
}
function closeCalendar(){ document.getElementById('cal-overlay').classList.remove('open'); }
function calShift(d){
  calYM[1] += d;
  if(calYM[1] < 0){ calYM[1] = 11; calYM[0]--; }
  if(calYM[1] > 11){ calYM[1] = 0; calYM[0]++; }
  renderCalendar();
}
function dkey(d){ return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function renderCalendar(){
  const [y, m] = calYM;
  const days = trainedDays();
  const todayK = dkey(new Date());
  document.getElementById('cal-month').textContent =
    new Date(y, m, 1).toLocaleDateString('de-DE', { month:'long', year:'numeric' });
  const first = new Date(y, m, 1);
  let start = new Date(first);
  start.setDate(1 - ((first.getDay() + 6) % 7)); // Monday start
  let html = ['Mo','Di','Mi','Do','Fr','Sa','So'].map(d => `<div class="dow">${d}</div>`).join('');
  for(let i = 0; i < 42; i++){
    const d = new Date(start); d.setDate(start.getDate() + i);
    const k = dkey(d);
    const cls = ['cal-day'];
    if(d.getMonth() !== m) cls.push('other');
    if(k === todayK) cls.push('today');
    if(days[k]) cls.push('trained');
    html += `<div class="${cls.join(' ')}">${d.getDate()}</div>`;
  }
  document.getElementById('cal-grid').innerHTML = html;
  // Stats
  const monthCount = Object.keys(days).filter(k => k.startsWith(y + '-' + String(m+1).padStart(2,'0'))).length;
  let streak = 0;
  const cur = new Date();
  if(!days[dkey(cur)]) cur.setDate(cur.getDate() - 1); // today not yet trained -> start yesterday
  while(days[dkey(cur)]){ streak++; cur.setDate(cur.getDate() - 1); }
  const total = Object.keys(days).length;
  document.getElementById('cal-stats').innerHTML = `
    <div class="stat"><div class="v">${monthCount}</div><div class="l">Tage diesen Monat</div></div>
    <div class="stat"><div class="v">${streak}</div><div class="l">Tage-Streak</div></div>
    <div class="stat"><div class="v">${total}</div><div class="l">Trainingstage gesamt</div></div>`;
}

// ---------- Progress chart ----------
function drawChart(exId){
  const ex = findEx(exId); if(!ex) return;
  const cv = document.getElementById(`chart-${exId}`);
  if(!cv || ex.history.length < 2) return;
  const dpr = window.devicePixelRatio || 1;
  const W = cv.clientWidth * dpr, H = cv.clientHeight * dpr;
  cv.width = W; cv.height = H;
  const g = cv.getContext('2d');
  const sessions = [...ex.history].reverse(); // oldest -> newest
  const kg   = sessions.map(h => Math.max(...h.sets.map(s => parseFloat(s.kg)   || 0)));
  const reps = sessions.map(h => Math.max(...h.sets.map(s => parseFloat(s.reps) || 0)));
  const pad = 26*dpr, n = sessions.length;
  const x = i => pad + i * (W - 2*pad) / (n - 1);
  function line(data, color){
    const mx = Math.max(...data, 1);
    const y = v => H - pad - (v/mx) * (H - 2*pad);
    g.strokeStyle = color; g.fillStyle = color; g.lineWidth = 2*dpr;
    g.beginPath();
    data.forEach((v,i) => i ? g.lineTo(x(i), y(v)) : g.moveTo(x(i), y(v)));
    g.stroke();
    data.forEach((v,i) => { g.beginPath(); g.arc(x(i), y(v), 3*dpr, 0, 7); g.fill(); });
    g.font = `${10*dpr}px sans-serif`;
    g.textAlign = 'right';
    g.fillText(String(Math.round(data[n-1]*10)/10), x(n-1) - 6*dpr, Math.max(y(data[n-1]) - 7*dpr, 12*dpr));
    g.textAlign = 'left';
  }
  if(kg.some(v => v > 0))   line(kg,   '#4dabf7');
  if(reps.some(v => v > 0)) line(reps, '#ffa94d');
}

// ---------- Backup ----------
function openData(){ document.getElementById('data-dlg').showModal(); }

function csvCell(v){
  v = String(v == null ? '' : v);
  return /[;"\n]/.test(v) ? '"' + v.replace(/"/g,'""') + '"' : v;
}
function exportCSV(){
  closeData();
  const rows = [['Datum','Seite','Uebung','Satz','Gewicht_kg','Wiederholungen','Zeit']];
  state.pages.forEach(p => p.exercises.forEach(ex => ex.history.forEach(h => {
    h.sets.forEach((s,i) => {
      if(s.kg === '' && s.reps === '' && !s.sec) return;
      rows.push([h.date.slice(0,10), p.name, ex.name, i+1,
        String(s.kg).replace('.',','), s.reps, fmt(s.sec||0)]);
    });
  })));
  const csv = '\uFEFF' + rows.map(r => r.map(csvCell).join(';')).join('\r\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'training-export-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}
function parseCSV(text){
  text = text.replace(/^\uFEFF/,'');
  const head = text.split('\n')[0];
  const delim = ((head.match(/;/g)||[]).length >= (head.match(/,/g)||[]).length) ? ';' : ',';
  const rows = []; let cur = [], val = '', q = false;
  for(let i = 0; i < text.length; i++){
    const c = text[i];
    if(q){
      if(c === '"'){ if(text[i+1] === '"'){ val += '"'; i++; } else q = false; }
      else val += c;
    }
    else if(c === '"') q = true;
    else if(c === delim){ cur.push(val); val = ''; }
    else if(c === '\n' || c === '\r'){
      if(val !== '' || cur.length){ cur.push(val); rows.push(cur); cur = []; val = ''; }
    }
    else val += c;
  }
  if(val !== '' || cur.length){ cur.push(val); rows.push(cur); }
  return rows;
}
function importCSV(){
  closeData();
  const fi = document.getElementById('file-in');
  fi.accept = '.csv,text/csv';
  fi.onchange = () => {
    const f = fi.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = () => {
      try{
        const rows = parseCSV(r.result);
        if(rows.length < 2) throw 0;
        let added = 0;
        rows.slice(1).forEach(c => {
          if(c.length < 7) return;
          const dat = c[0].trim(), pName = c[1], exName = c[2];
          if(!/^\d{4}-\d{2}-\d{2}$/.test(dat) || !exName) return;
          let p = state.pages.find(x => x.name === pName);
          if(!p){ p = { id: uid(), name: pName || 'Import', exercises: [], mode: 'ex' }; state.pages.push(p); }
          let ex = p.exercises.find(x => x.name === exName);
          if(!ex){ ex = newExercise(exName); p.exercises.push(ex); }
          let h = ex.history.find(x => x.date.slice(0,10) === dat);
          if(!h){
            h = { date: dat + 'T12:00:00.000Z', sets: emptySets() };
            ex.history.push(h); added++;
          }
          const i = Math.min(Math.max((parseInt(c[3])||1)-1, 0), 2);
          h.sets[i] = { kg: String(c[4]).replace(',','.').trim(), reps: String(c[5]).trim(), sec: parseTime(c[6]) };
        });
        state.pages.forEach(p => p.exercises.forEach(ex =>
          ex.history.sort((a,b) => b.date.localeCompare(a.date))));
        if(!activePage && state.pages.length) activePage = state.pages[0].id;
        save(); render();
        alert(added + ' Trainingseinträge importiert.');
      }catch(e){ alert('CSV konnte nicht gelesen werden.'); }
    };
    r.readAsText(f);
    fi.value = '';
  };
  fi.click();
}

function exportData(){
  closeData();
  const blob = new Blob([JSON.stringify(state,null,1)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);

function importData(){

  tabs.innerHTML = state.pages.map(p =>
    `<button class="tab ${p.id===activePage?'active':''}" onclick="activePage='${p.id}';render()">${esc(p.name)}</button>`
  ).join('') + `<button class="tab add" onclick="addPage()">＋ Seite</button>`;

  const mode = p.mode || 'ex';

    <button class="${mode==='ex'?'on':''}" onclick="setMode('ex')">Übungsweise</button>

  p.exercises.forEach(ex => [0,1,2].forEach(i => paintTimer(ex.id, i)));

}

function cardHTML(ex){
  const rows = [0,1,2].map(i => {
    const s = ex.current[i];
    return `<tr>
      <td class="set-label">S${i+1}</td>
      <td><input class="num" type="number" inputmode="decimal" step="0.5" placeholder="kg"
        value="${esc(s.kg)}" oninput="setVal('${ex.id}',${i},'kg',this.value)"></td>
      <td><input class="num" type="number" inputmode="numeric" placeholder="Wdh."
        value="${esc(s.reps)}" oninput="setVal('${ex.id}',${i},'reps',this.value)"></td>
      <td><div class="time-cell">
        <input class="time" id="time-${ex.id}-${i}" value="${fmt(s.sec)}"
          onchange="setTime('${ex.id}',${i},this.value)">
        <button class="timer-btn" id="tbtn-${ex.id}-${i}" onclick="toggleTimer('${ex.id}',${i})">▶</button>
      </div></td>
    </tr>`;
  }).join('');

  const histHTML = openHistory.has(ex.id) ? historyHTML(ex) : '';

  const noteHTML = openNotes.has(ex.id)
    ? `<textarea class="note" placeholder="Notiz, z.B. Griff enger…" onchange="setNote('${ex.id}',this.value)">${esc(ex.note||'')}</textarea>`
    : '';
  return `<div class="card">
    <div class="card-head">
      ${ex.img ? `<img class="thumb" src="${IMG_BASE}${esc(ex.img)}" loading="lazy" onerror="this.style.display='none'">` : ''}
      <div class="head-mid">
        <span class="name" onclick="renameExercise('${ex.id}')">${esc(ex.name)}</span>
        <span class="total" id="total-${ex.id}">Gesamt: <b>${fmt(totalSec(ex))}</b></span>
      </div>
      <button class="icon-btn" onclick="moveExercise('${ex.id}',-1)">↑</button>
      <button class="icon-btn" onclick="moveExercise('${ex.id}',1)">↓</button>
      <button class="icon-btn" onclick="deleteExercise('${ex.id}')">🗑</button>
    </div>
    <table class="sets">
      <tr><th></th><th>Gewicht (kg)</th><th>Wdh.</th><th>Zeit</th></tr>
      ${rows}
    </table>
    <div class="actions">
      <button class="btn copy" onclick="copyLast('${ex.id}')" ${ex.history.length?'':'disabled'}>⟳ Letzte Werte</button>
      <button class="btn save" onclick="saveSession('${ex.id}')">✓ Speichern</button>
      <button class="btn hist" onclick="toggleNote('${ex.id}')">📝</button>
      <button class="btn hist" onclick="toggleHistory('${ex.id}')">📈 ${ex.history.length}</button>
    </div>
    ${noteHTML}
    ${histHTML}
  </div>`;
}

function historyHTML(ex){
  if(!ex.history.length) return `<div class="history"><div class="empty" style="margin:8px 0">Noch kein Verlauf – speichere zuerst ein Training.</div></div>`;
  const chart = ex.history.length >= 2
    ? `<canvas class="chart" id="chart-${ex.id}"></canvas>
       <div class="chart-legend"><span class="lg-kg">● max. kg</span><span class="lg-reps">● max. Wdh.</span></div>`
    : '';
  return `<div class="history">` + chart + ex.history.map((h,i) => {
    const d = new Date(h.date);
    const date = d.toLocaleDateString('de-DE',{weekday:'short', day:'2-digit', month:'2-digit', year:'2-digit'});
    const total = h.sets.reduce((a,s)=>a+(s.sec||0),0);
    const sets = h.sets.map((s,j) =>
      `<span class="h-set">${s.kg||'–'}<small> kg</small> × ${s.reps||'–'} <small>| ${fmt(s.sec||0)}</small></span>`
    ).join('');
    return `<div class="h-entry">
      <div class="h-date"><span>${date}</span><span class="h-total">Σ ${fmt(total)}
        <button class="h-del" onclick="deleteHistEntry('${ex.id}',${i})">✕</button></span></div>
      <div class="h-sets">${sets}</div>
    </div>`;
  }).join('') + `</div>`;
}

// First run: create example page
if(!state.pages.length){
  state.pages.push({ id: uid(), name: 'Training 1', exercises: [], mode: 'ex' });
  activePage = state.pages[0].id;
  save();
}
loadCatalog();
render();
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
